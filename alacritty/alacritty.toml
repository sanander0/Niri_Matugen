[general]
import = ["~/.config/alacritty/colors.toml"]

[font]
size = 11.5

[font.normal]
family = "JetBrains Mono"
style = "Regular"

[font.bold]
family = "JetBrains Mono"
style = "Bold"

[font.italic]
family = "JetBrains Mono"
style = "Italic"

[font.bold_italic]
family = "JetBrains Mono"
style = "Bold Italic"

[window]
padding = { x = 10, y = 10 }

[cursor.style]
shape = "Beam"
blinking = "On"

[terminal.shell]
program = "/bin/bash"
args = ["-c", "fastfetch; exec bash"]
